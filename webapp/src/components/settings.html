<!-- ============ CONTROL PANEL ============ -->
<section class="control-panel" id="control-panel" aria-label="Content settings">
  <div class="field">
    <label for="datePick">📅 Content date (CTA rotates per day)</label>
    <input type="date" id="datePick">
  </div>
  <div class="field">
    <label>🚫 Never-repeat memory</label>
    <button class="btn btn-ghost" id="btnResetHistory" title="Clear the stored history of already-used questions">
      <i class="fa-solid fa-broom"></i> Reset used-question history
    </button>
  </div>
</section>
